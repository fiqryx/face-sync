version: "3.8"

services:
  app-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: facesync_app
    network_mode: "host"
    environment:
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - REDIS_HOST=127.0.0.1
      - PORT=8000

    volumes:
      - ./app-bin:/app/bin
      - ./storage:/app/storage
      - flag_data:/app/flag
    depends_on:
      - postgres-db
      - redis-cache
      - mediamtx-stream
    restart: always

  mediamtx-stream:
    image: bluenviron/mediamtx:latest
    container_name: facesync_mediamtx
    network_mode: "host"
    environment:
      - MTX_API=yes
      - MTX_APIADDRESS=127.0.0.1:9997
      - MTX_WEBRTC=yes
    restart: always

  postgres-db:
    image: postgres:15-alpine
    container_name: facesync_postgres
    network_mode: "host"
    environment:
      - POSTGRES_USER=facesync
      - POSTGRES_PASSWORD=secretpassword
      - POSTGRES_DB=facesync_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # =====================================================================
  # 4. Redis Cache
  # =====================================================================
  redis-cache:
    image: redis:7-alpine
    container_name: facesync_redis
    network_mode: "host"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
  flag_data:
